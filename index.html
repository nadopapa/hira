<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4f46e5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="가나 테스트">
  <meta name="format-detection" content="telephone=no">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>히라가나·가타카나 암기 테스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f7fb; --card: #fff; --text: #1a1a2e; --muted: #6b7280;
      --primary: #4f46e5; --success: #16a34a; --success-bg: #dcfce7;
      --error: #dc2626; --error-bg: #fee2e2; --timer: #f59e0b;
      --radius: 16px; --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    body {
      font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100dvh; line-height: 1.5; -webkit-text-size-adjust: 100%;
      overflow-x: hidden;
    }

    .app {
      max-width: 520px; margin: 0 auto;
      padding: max(12px, env(safe-area-inset-top)) 16px 8px;
      min-height: 100dvh; display: flex; flex-direction: column;
    }
    .app.test-active { padding-top: max(8px, env(safe-area-inset-top)); padding-bottom: 4px; height: 100dvh; }
    .app.test-active header { display: none; }

    header { text-align: center; padding: 8px 0 10px; }
    header h1 { font-size: 1.3rem; font-weight: 700; }
    header .meta { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }

    .screen { display: none; flex: 1; flex-direction: column; min-height: 0; }
    .screen.active { display: flex; }

    .card {
      background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 20px 16px; flex: 1; width: 100%;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }

    .start-desc { text-align: center; color: var(--muted); font-size: 0.9rem; line-height: 1.6; }

    .stats-grid { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stats-block { background: var(--bg); border-radius: 12px; padding: 12px; }
    .stats-block h3 { font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; text-align: center; }
    .stats-block .row { display: flex; justify-content: space-around; text-align: center; }
    .stats-block .label { font-size: 0.7rem; color: var(--muted); }
    .stats-block .value { font-size: 1.15rem; font-weight: 700; }

    .test-layout {
      flex: 1; width: 100%; display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 6px; padding: 8px 16px;
    }
    .test-question { flex-shrink: 0; width: 100%; text-align: center; }
    .test-answer { flex-shrink: 0; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 6px; }

    .progress { font-size: 0.85rem; color: var(--muted); font-weight: 600; }
    .char-display { font-size: clamp(4rem, 20vw, 7rem); line-height: 1; margin: 2px 0; user-select: none; }

    .timer-wrap { width: 100%; max-width: 360px; }
    .timer-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
    .timer-bar-bg { height: 6px; background: #e5e7eb; border-radius: 999px; overflow: hidden; }
    .timer-bar { height: 100%; width: 100%; background: var(--timer); transition: width 0.1s linear; }
    .timer-bar.urgent { background: var(--error); }

    .answer-row { display: flex; gap: 8px; width: 100%; }
    .answer-row input {
      flex: 1; min-width: 0; padding: 12px 14px; font-size: 1.15rem;
      border: 2px solid #e5e7eb; border-radius: 12px; outline: none; text-align: center; min-height: 46px;
    }
    .answer-row input:focus { border-color: var(--primary); }
    .answer-row .btn-submit { flex: 0 0 auto; min-width: 76px; padding: 12px 14px; font-size: 0.95rem; }

    .feedback { font-size: 0.95rem; font-weight: 700; padding: 8px 14px; border-radius: 10px; display: none; width: 100%; text-align: center; }
    .feedback.show { display: block; }
    .feedback.correct { background: var(--success-bg); color: var(--success); }
    .feedback.wrong { background: var(--error-bg); color: var(--error); }

    .btn-row { display: flex; flex-wrap: wrap; gap: 8px; width: 100%; }
    button {
      border: none; border-radius: 12px; padding: 14px 16px; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; flex: 1 1 100%; min-height: 48px; touch-action: manipulation;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-hira { background: #6366f1; color: #fff; }
    .btn-kata { background: #7c3aed; color: #fff; }
    .btn-all { background: #4f46e5; color: #fff; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-secondary { background: #e5e7eb; color: var(--text); }
    .btn-danger { background: var(--error-bg); color: var(--error); }

    .complete-icon { font-size: 3rem; line-height: 1; }
    .complete-title { font-size: 1.4rem; font-weight: 700; text-align: center; }
    .complete-desc { text-align: center; color: var(--muted); font-size: 0.9rem; line-height: 1.6; }

    .result-title { font-size: 1.4rem; font-weight: 700; }
    .result-summary { width: 100%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat-box { background: var(--bg); border-radius: 12px; padding: 10px; text-align: center; }
    .stat-box .label { font-size: 0.7rem; color: var(--muted); }
    .stat-box .value { font-size: 1.15rem; font-weight: 700; }
    .stat-box .value.correct { color: var(--success); }
    .stat-box .value.wrong { color: var(--error); }

    .wrong-list { width: 100%; background: var(--bg); border-radius: 12px; padding: 12px; }
    .wrong-list h3 { font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; }
    .wrong-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { background: var(--error-bg); color: var(--error); padding: 5px 10px; border-radius: 999px; font-size: 0.9rem; }
    .chip .sub { font-size: 0.75rem; opacity: 0.85; margin-left: 4px; }
    .result-details { width: 100%; max-height: 180px; overflow-y: auto; font-size: 0.8rem; }
    .result-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #e5e7eb; }

    body.kb-open .test-layout { justify-content: flex-start; padding-top: 4px; gap: 4px; }
    body.kb-open .char-display { font-size: clamp(2.75rem, 16vw, 4rem) !important; }

    #btn-install { display: none; }

    @media (max-width: 600px) {
      .char-display { font-size: clamp(3.5rem, 22vw, 5.5rem); }
      .answer-row .btn-submit { min-width: 68px; font-size: 0.9rem; }
      .result-summary { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app" id="app-root">
    <header>
      <h1>히라가나·가타카나 테스트</h1>
      <p class="meta">한글 발음을 입력해서 답하기</p>
    </header>

    <!-- 타이틀 -->
    <section id="screen-start" class="screen active">
      <div class="card">
        <p class="start-desc">
          히라가나·가타카나 46자씩 발음 테스트<br>
          한글 발음 입력 · 문제당 <strong>5초</strong> 제한
        </p>
        <div class="stats-grid">
          <div class="stats-block">
            <h3>히라가나</h3>
            <div class="row">
              <div><div class="label">회차</div><div class="value" id="hira-session">1</div></div>
              <div><div class="label">누적 오답</div><div class="value" id="hira-wrong">0</div></div>
            </div>
          </div>
          <div class="stats-block">
            <h3>가타카나</h3>
            <div class="row">
              <div><div class="label">회차</div><div class="value" id="kata-session">1</div></div>
              <div><div class="label">누적 오답</div><div class="value" id="kata-wrong">0</div></div>
            </div>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn-hira" id="btn-start-hira">히라가나 테스트</button>
          <button class="btn-kata" id="btn-start-kata">가타카나 테스트</button>
          <button class="btn-all" id="btn-start-all">전부 테스트</button>
          <button class="btn-secondary" id="btn-install">앱으로 설치</button>
          <button class="btn-danger" id="btn-reset-data">데이터 초기화</button>
        </div>
      </div>
    </section>

    <!-- 테스트 -->
    <section id="screen-test" class="screen">
      <div class="test-layout" id="test-layout">
        <div class="test-question">
          <div class="progress" id="question-progress">1 / 10</div>
          <div class="char-display" id="char-display">あ</div>
        </div>
        <div class="timer-wrap">
          <div class="timer-label"><span>남은 시간</span><span id="timer-text">5.0초</span></div>
          <div class="timer-bar-bg"><div class="timer-bar" id="timer-bar"></div></div>
        </div>
        <div class="test-answer">
          <div class="answer-row">
            <input type="text" id="answer-input" placeholder="한글 발음" autocomplete="off" enterkeyhint="done">
            <button class="btn-success btn-submit" id="btn-submit" disabled>제출</button>
          </div>
          <div class="feedback" id="feedback"></div>
        </div>
      </div>
    </section>

    <!-- 결과 -->
    <section id="screen-result" class="screen">
      <div class="card">
        <div class="result-title" id="result-title">테스트 결과</div>
        <div class="result-summary">
          <div class="stat-box"><div class="label">총 문제</div><div class="value" id="result-total">10</div></div>
          <div class="stat-box"><div class="label">정답</div><div class="value correct" id="result-correct">0</div></div>
          <div class="stat-box"><div class="label">오답</div><div class="value wrong" id="result-wrong">0</div></div>
        </div>
        <div class="wrong-list"><h3>이번 테스트 오답</h3><div class="wrong-chips" id="wrong-chips"></div></div>
        <div class="result-details" id="result-details"></div>
        <div class="btn-row">
          <button class="btn-primary" id="btn-restart">다음 테스트</button>
          <button class="btn-secondary" id="btn-back-home">타이틀로</button>
        </div>
      </div>
    </section>

    <!-- 완료 -->
    <section id="screen-complete" class="screen">
      <div class="card">
        <div class="complete-icon">🎉</div>
        <div class="complete-title" id="complete-title">테스트 완료!</div>
        <p class="complete-desc" id="complete-desc"></p>
        <div class="btn-row">
          <button class="btn-primary" id="btn-complete-home">타이틀로</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    const QUESTIONS_PER_TEST = 10;
    const ANSWER_TIMEOUT_MS = 5000;
    const STORAGE_KEY = 'kanaMemoryTest';

    const HIRAGANA_DATA = [
      { char: 'あ', korean: '아', type: 'hiragana' }, { char: 'い', korean: '이', type: 'hiragana' },
      { char: 'う', korean: '우', type: 'hiragana' }, { char: 'え', korean: '에', type: 'hiragana' },
      { char: 'お', korean: '오', type: 'hiragana' }, { char: 'か', korean: '카', type: 'hiragana' },
      { char: 'き', korean: '키', type: 'hiragana' }, { char: 'く', korean: '쿠', type: 'hiragana' },
      { char: 'け', korean: '케', type: 'hiragana' }, { char: 'こ', korean: '코', type: 'hiragana' },
      { char: 'さ', korean: '사', type: 'hiragana' }, { char: 'し', korean: '시', type: 'hiragana' },
      { char: 'す', korean: '스', type: 'hiragana' }, { char: 'せ', korean: '세', type: 'hiragana' },
      { char: 'そ', korean: '소', type: 'hiragana' }, { char: 'た', korean: '타', type: 'hiragana' },
      { char: 'ち', korean: '치', type: 'hiragana' }, { char: 'つ', korean: '츠', type: 'hiragana' },
      { char: 'て', korean: '테', type: 'hiragana' }, { char: 'と', korean: '토', type: 'hiragana' },
      { char: 'な', korean: '나', type: 'hiragana' }, { char: 'に', korean: '니', type: 'hiragana' },
      { char: 'ぬ', korean: '누', type: 'hiragana' }, { char: 'ね', korean: '네', type: 'hiragana' },
      { char: 'の', korean: '노', type: 'hiragana' }, { char: 'は', korean: '하', type: 'hiragana' },
      { char: 'ひ', korean: '히', type: 'hiragana' }, { char: 'ふ', korean: '후', type: 'hiragana' },
      { char: 'へ', korean: '헤', type: 'hiragana' }, { char: 'ほ', korean: '호', type: 'hiragana' },
      { char: 'ま', korean: '마', type: 'hiragana' }, { char: 'み', korean: '미', type: 'hiragana' },
      { char: 'む', korean: '무', type: 'hiragana' }, { char: 'め', korean: '메', type: 'hiragana' },
      { char: 'も', korean: '모', type: 'hiragana' }, { char: 'や', korean: '야', type: 'hiragana' },
      { char: 'ゆ', korean: '유', type: 'hiragana' }, { char: 'よ', korean: '요', type: 'hiragana' },
      { char: 'ら', korean: '라', type: 'hiragana' }, { char: 'り', korean: '리', type: 'hiragana' },
      { char: 'る', korean: '루', type: 'hiragana' }, { char: 'れ', korean: '레', type: 'hiragana' },
      { char: 'ろ', korean: '로', type: 'hiragana' }, { char: 'わ', korean: '와', type: 'hiragana' },
      { char: 'を', korean: '오', type: 'hiragana' }, { char: 'ん', korean: '응', type: 'hiragana' }
    ];

    const KATAKANA_DATA = [
      { char: 'ア', korean: '아', type: 'katakana' }, { char: 'イ', korean: '이', type: 'katakana' },
      { char: 'ウ', korean: '우', type: 'katakana' }, { char: 'エ', korean: '에', type: 'katakana' },
      { char: 'オ', korean: '오', type: 'katakana' }, { char: 'カ', korean: '카', type: 'katakana' },
      { char: 'キ', korean: '키', type: 'katakana' }, { char: 'ク', korean: '쿠', type: 'katakana' },
      { char: 'ケ', korean: '케', type: 'katakana' }, { char: 'コ', korean: '코', type: 'katakana' },
      { char: 'サ', korean: '사', type: 'katakana' }, { char: 'シ', korean: '시', type: 'katakana' },
      { char: 'ス', korean: '스', type: 'katakana' }, { char: 'セ', korean: '세', type: 'katakana' },
      { char: 'ソ', korean: '소', type: 'katakana' }, { char: 'タ', korean: '타', type: 'katakana' },
      { char: 'チ', korean: '치', type: 'katakana' }, { char: 'ツ', korean: '츠', type: 'katakana' },
      { char: 'テ', korean: '테', type: 'katakana' }, { char: 'ト', korean: '토', type: 'katakana' },
      { char: 'ナ', korean: '나', type: 'katakana' }, { char: 'ニ', korean: '니', type: 'katakana' },
      { char: 'ヌ', korean: '누', type: 'katakana' }, { char: 'ネ', korean: '네', type: 'katakana' },
      { char: 'ノ', korean: '노', type: 'katakana' }, { char: 'ハ', korean: '하', type: 'katakana' },
      { char: 'ヒ', korean: '히', type: 'katakana' }, { char: 'フ', korean: '후', type: 'katakana' },
      { char: 'ヘ', korean: '헤', type: 'katakana' }, { char: 'ホ', korean: '호', type: 'katakana' },
      { char: 'マ', korean: '마', type: 'katakana' }, { char: 'ミ', korean: '미', type: 'katakana' },
      { char: 'ム', korean: '무', type: 'katakana' }, { char: 'メ', korean: '메', type: 'katakana' },
      { char: 'モ', korean: '모', type: 'katakana' }, { char: 'ヤ', korean: '야', type: 'katakana' },
      { char: 'ユ', korean: '유', type: 'katakana' }, { char: 'ヨ', korean: '요', type: 'katakana' },
      { char: 'ラ', korean: '라', type: 'katakana' }, { char: 'リ', korean: '리', type: 'katakana' },
      { char: 'ル', korean: '루', type: 'katakana' }, { char: 'レ', korean: '레', type: 'katakana' },
      { char: 'ロ', korean: '로', type: 'katakana' }, { char: 'ワ', korean: '와', type: 'katakana' },
      { char: 'ヲ', korean: '오', type: 'katakana' }, { char: 'ン', korean: '응', type: 'katakana' }
    ];

    const MODE_LABELS = { hiragana: '히라가나', katakana: '가타카나', all: '히라가나·가타카나' };

    function createModeState() {
      return { sessionCount: 1, seenUntilFive: [], wrongPool: [], completed: false };
    }

    const appState = {
      modes: { hiragana: createModeState(), katakana: createModeState(), all: createModeState() },
      currentMode: null,
      questions: [],
      currentIndex: 0,
      results: [],
      submitted: false
    };

    let timerInterval = null;
    let timerDeadline = 0;
    let installPrompt = null;

    const ui = {
      screenStart: document.getElementById('screen-start'),
      screenTest: document.getElementById('screen-test'),
      screenResult: document.getElementById('screen-result'),
      screenComplete: document.getElementById('screen-complete'),
      hiraSession: document.getElementById('hira-session'),
      hiraWrong: document.getElementById('hira-wrong'),
      kataSession: document.getElementById('kata-session'),
      kataWrong: document.getElementById('kata-wrong'),
      testLayout: document.getElementById('test-layout'),
      questionProgress: document.getElementById('question-progress'),
      charDisplay: document.getElementById('char-display'),
      timerText: document.getElementById('timer-text'),
      timerBar: document.getElementById('timer-bar'),
      answerInput: document.getElementById('answer-input'),
      feedback: document.getElementById('feedback'),
      btnSubmit: document.getElementById('btn-submit'),
      resultTitle: document.getElementById('result-title'),
      resultTotal: document.getElementById('result-total'),
      resultCorrect: document.getElementById('result-correct'),
      resultWrong: document.getElementById('result-wrong'),
      wrongChips: document.getElementById('wrong-chips'),
      resultDetails: document.getElementById('result-details'),
      completeTitle: document.getElementById('complete-title'),
      completeDesc: document.getElementById('complete-desc'),
      btnInstall: document.getElementById('btn-install')
    };

    function normalizeKorean(text) {
      if (!text) return '';
      return String(text).replace(/\s+/g, '').replace(/[\p{P}\p{S}]/gu, '');
    }

    function shuffleArray(arr) {
      var copy = arr.slice();
      for (var i = copy.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = copy[i]; copy[i] = copy[j]; copy[j] = t;
      }
      return copy;
    }

    function getPool(mode) {
      if (mode === 'hiragana') return HIRAGANA_DATA;
      if (mode === 'katakana') return KATAKANA_DATA;
      return HIRAGANA_DATA.concat(KATAKANA_DATA);
    }

    function getModeState(mode) { return appState.modes[mode]; }

    function findInPool(char) {
      var item = HIRAGANA_DATA.find(function (x) { return x.char === char; });
      if (item) return item;
      return KATAKANA_DATA.find(function (x) { return x.char === char; });
    }

    function showScreen(name) {
      ['screenStart', 'screenTest', 'screenResult', 'screenComplete'].forEach(function (key) {
        ui[key].classList.remove('active');
      });
      if (name === 'start') ui.screenStart.classList.add('active');
      if (name === 'test') ui.screenTest.classList.add('active');
      if (name === 'result') ui.screenResult.classList.add('active');
      if (name === 'complete') ui.screenComplete.classList.add('active');
      document.getElementById('app-root').classList.toggle('test-active', name === 'test');
    }

    function saveProgress() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ modes: appState.modes })); }
      catch (e) { console.warn('저장 실패:', e); }
    }

    function loadProgress() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        var data = JSON.parse(raw);
        if (data.modes) {
          ['hiragana', 'katakana', 'all'].forEach(function (m) {
            if (data.modes[m]) Object.assign(appState.modes[m], createModeState(), data.modes[m]);
          });
          return;
        }
        /* 구버전 데이터 → 히라가나로 이전 */
        if (data.testSessionCount) {
          appState.modes.hiragana.sessionCount = data.testSessionCount;
          appState.modes.hiragana.seenUntilFive = data.seenUntilFive || [];
          appState.modes.hiragana.wrongPool = data.wrongPool || [];
        }
      } catch (e) { console.warn('불러오기 실패:', e); }
    }

    function resetProgress() {
      appState.modes = { hiragana: createModeState(), katakana: createModeState(), all: createModeState() };
      saveProgress();
      updateStartScreen();
    }

    function updateStartScreen() {
      ui.hiraSession.textContent = appState.modes.hiragana.sessionCount;
      ui.hiraWrong.textContent = appState.modes.hiragana.wrongPool.length;
      ui.kataSession.textContent = appState.modes.katakana.sessionCount;
      ui.kataWrong.textContent = appState.modes.katakana.wrongPool.length;
    }

    /** 문제 출제: 회차 내 중복 없음, 10문제 미만 허용 */
    function getQuestionSet(mode) {
      var state = getModeState(mode);
      var pool = getPool(mode);
      var session = state.sessionCount;

      if (session <= 5) {
        var seen = new Set(state.seenUntilFive);
        var available = shuffleArray(pool.filter(function (item) { return !seen.has(item.char); }));
        if (available.length > 0) {
          return available.slice(0, Math.min(QUESTIONS_PER_TEST, available.length));
        }
      }

      if (state.wrongPool.length === 0) return [];

      var used = new Set();
      var unique = [];
      shuffleArray(state.wrongPool).forEach(function (w) {
        if (!used.has(w.char)) { unique.push(w); used.add(w.char); }
      });
      return unique.slice(0, Math.min(QUESTIONS_PER_TEST, unique.length));
    }

    function judgeAnswer(expectedKorean, userInput) {
      return normalizeKorean(expectedKorean) === normalizeKorean(userInput);
    }

    function addToWrongPool(mode, item) {
      var state = getModeState(mode);
      if (!state.wrongPool.some(function (w) { return w.char === item.char; })) {
        state.wrongPool.push(item);
      }
    }

    function removeFromWrongPool(mode, char) {
      var state = getModeState(mode);
      state.wrongPool = state.wrongPool.filter(function (w) { return w.char !== char; });
    }

    function markSeenAfterTest(mode, questions) {
      var state = getModeState(mode);
      if (state.sessionCount <= 5) {
        var seen = new Set(state.seenUntilFive);
        questions.forEach(function (q) { seen.add(q.char); });
        state.seenUntilFive = Array.from(seen);
      }
    }

    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    function startTimer() {
      stopTimer();
      timerDeadline = Date.now() + ANSWER_TIMEOUT_MS;
      ui.timerBar.style.width = '100%';
      ui.timerBar.classList.remove('urgent');
      timerInterval = setInterval(function () {
        var left = Math.max(0, timerDeadline - Date.now());
        var ratio = left / ANSWER_TIMEOUT_MS;
        ui.timerBar.style.width = (ratio * 100) + '%';
        ui.timerText.textContent = (left / 1000).toFixed(1) + '초';
        if (ratio < 0.3) ui.timerBar.classList.add('urgent');
        if (left <= 0) { stopTimer(); submitAnswer(true); }
      }, 50);
    }

    function startTest(mode) {
      appState.currentMode = mode;
      var questions = getQuestionSet(mode);
      if (questions.length === 0) {
        showCompletionScreen(mode);
        return;
      }
      appState.questions = questions;
      appState.currentIndex = 0;
      appState.results = [];
      showScreen('test');
      showQuestion();
    }

    function showCompletionScreen(mode) {
      var state = getModeState(mode);
      state.completed = true;
      saveProgress();
      ui.completeTitle.textContent = MODE_LABELS[mode] + ' 테스트 완료!';
      ui.completeDesc.textContent =
        '모든 문자를 학습했고 누적 오답이 없습니다.\n' + MODE_LABELS[mode] + ' 암기를 마쳤습니다.';
      showScreen('complete');
    }

    function showQuestion() {
      var q = appState.questions[appState.currentIndex];
      if (!q) { finishTest(); return; }

      appState.submitted = false;
      ui.answerInput.value = '';
      ui.btnSubmit.disabled = true;
      ui.feedback.classList.remove('show', 'correct', 'wrong');
      ui.feedback.textContent = '';
      ui.questionProgress.textContent = (appState.currentIndex + 1) + ' / ' + appState.questions.length;
      ui.charDisplay.textContent = q.char;

      startTimer();
      setTimeout(function () {
        try { ui.answerInput.focus({ preventScroll: true }); }
        catch (e) { ui.answerInput.focus(); }
      }, 80);
    }

    function submitAnswer(isTimeout) {
      if (appState.submitted) return;
      appState.submitted = true;
      stopTimer();

      var q = appState.questions[appState.currentIndex];
      var answer = isTimeout ? '' : ui.answerInput.value.trim();
      var isCorrect = !isTimeout && answer && judgeAnswer(q.korean, answer);

      appState.results.push({
        number: appState.currentIndex + 1,
        char: q.char,
        correctAnswer: q.korean,
        userInput: isTimeout ? '(시간 초과)' : answer,
        isCorrect: isCorrect,
        timedOut: !!isTimeout
      });

      ui.feedback.classList.add('show');
      if (isCorrect) {
        ui.feedback.classList.add('correct');
        ui.feedback.textContent = '정답! (' + q.korean + ')';
      } else {
        ui.feedback.classList.add('wrong');
        ui.feedback.textContent = isTimeout
          ? '시간 초과 — 정답: ' + q.korean
          : '오답 — 정답: ' + q.korean + (answer ? ' / 입력: ' + answer : '');
      }
      ui.btnSubmit.disabled = true;

      setTimeout(function () {
        appState.currentIndex++;
        showQuestion();
      }, 1500);
    }

    function finishTest() {
      var mode = appState.currentMode;
      var state = getModeState(mode);

      appState.results.forEach(function (r) {
        var item = findInPool(r.char) || { char: r.char, korean: r.correctAnswer, type: mode };
        if (r.isCorrect) {
          removeFromWrongPool(mode, r.char);
        } else {
          addToWrongPool(mode, item);
        }
      });

      markSeenAfterTest(mode, appState.questions);
      state.sessionCount++;
      saveProgress();
      renderResultScreen();
      showScreen('result');
    }

    function renderResultScreen() {
      var results = appState.results;
      var correct = results.filter(function (r) { return r.isCorrect; }).length;
      ui.resultTitle.textContent = MODE_LABELS[appState.currentMode] + ' 결과';
      ui.resultTotal.textContent = results.length;
      ui.resultCorrect.textContent = correct;
      ui.resultWrong.textContent = results.length - correct;

      var wrongItems = results.filter(function (r) { return !r.isCorrect; });
      ui.wrongChips.innerHTML = wrongItems.length === 0
        ? '<span style="color:#6b7280;font-size:0.9rem">오답 없음</span>'
        : '';
      wrongItems.forEach(function (r) {
        var chip = document.createElement('span');
        chip.className = 'chip';
        chip.innerHTML = r.char + '<span class="sub">' + r.correctAnswer + '</span>';
        ui.wrongChips.appendChild(chip);
      });

      ui.resultDetails.innerHTML = '';
      results.forEach(function (r) {
        var row = document.createElement('div');
        row.className = 'result-row';
        row.innerHTML = '<span>' + r.number + '. ' + r.char + ' → ' + r.correctAnswer + '</span>' +
          '<span style="color:' + (r.isCorrect ? 'var(--success)' : 'var(--error)') + '">' +
          (r.isCorrect ? 'O' : 'X') + ' ' + r.userInput + '</span>';
        ui.resultDetails.appendChild(row);
      });
    }

    function setupKeyboardLayout() {
      if (!window.visualViewport) return;
      function update() {
        var vv = window.visualViewport;
        var kbOpen = vv.height < window.innerHeight * 0.78;
        document.body.classList.toggle('kb-open', kbOpen);
        if (ui.testLayout && ui.screenTest.classList.contains('active')) {
          ui.testLayout.style.maxHeight = kbOpen ? vv.height + 'px' : '';
          ui.testLayout.style.overflow = kbOpen ? 'hidden' : '';
        }
      }
      window.visualViewport.addEventListener('resize', update);
      ui.answerInput.addEventListener('focus', update);
      ui.answerInput.addEventListener('blur', function () {
        setTimeout(function () {
          document.body.classList.remove('kb-open');
          if (ui.testLayout) { ui.testLayout.style.maxHeight = ''; ui.testLayout.style.overflow = ''; }
        }, 100);
      });
    }

    function initApp() {
      loadProgress();
      updateStartScreen();
      setupKeyboardLayout();
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('./sw.js').then(function (r) { r.update(); }).catch(function () {});
        });
      }

      document.getElementById('btn-start-hira').addEventListener('click', function () { startTest('hiragana'); });
      document.getElementById('btn-start-kata').addEventListener('click', function () { startTest('katakana'); });
      document.getElementById('btn-start-all').addEventListener('click', function () { startTest('all'); });
      document.getElementById('btn-restart').addEventListener('click', function () { startTest(appState.currentMode); });
      document.getElementById('btn-back-home').addEventListener('click', function () { updateStartScreen(); showScreen('start'); });
      document.getElementById('btn-complete-home').addEventListener('click', function () { updateStartScreen(); showScreen('start'); });
      document.getElementById('btn-reset-data').addEventListener('click', function () {
        if (confirm('히라가나·가타카나·전부 테스트 데이터를 모두 초기화할까요?')) resetProgress();
      });
      ui.btnSubmit.addEventListener('click', function () { submitAnswer(false); });
      ui.answerInput.addEventListener('input', function () {
        ui.btnSubmit.disabled = !ui.answerInput.value.trim();
      });
      ui.answerInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !ui.btnSubmit.disabled) submitAnswer(false);
      });
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault(); installPrompt = e; ui.btnInstall.style.display = 'block';
      });
      ui.btnInstall.addEventListener('click', function () {
        if (!installPrompt) return;
        installPrompt.prompt();
        installPrompt.userChoice.then(function () { installPrompt = null; ui.btnInstall.style.display = 'none'; });
      });
    }

    document.addEventListener('DOMContentLoaded', initApp);
  </script>
</body>
